name: Jarvis CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  cloud-backend:
    name: Cloud Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install dependencies
        run: cd cloud && npm ci

      - name: TypeScript check
        run: cd cloud && npx tsc --noEmit

      - name: Smoke tests
        run: cd cloud && DB_MODE=sqlite npx tsx smoke-test.ts

      - name: Integration tests
        run: cd cloud && DB_MODE=sqlite npx tsx integration-test.ts

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: cd sdk && npm install

      - name: TypeScript check
        run: cd sdk && npx tsc --noEmit

      - name: Build
        run: cd sdk && npx tsc

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [cloud-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build cloud image
        run: docker build -t jarvis-cloud:test ./cloud
