version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jarvis_db
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis_secret_change_me}
    volumes:
      - jarvis-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  jarvis-cloud:
    build:
      context: ./cloud
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://jarvis:${POSTGRES_PASSWORD:-jarvis_secret_change_me}@postgres:5432/jarvis_db
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      TAX_API_URL: ${TAX_API_URL:-}
      TAX_API_KEY: ${TAX_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:18789}
    ports:
      - "3001:3001"

  jarvis-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - jarvis-cloud
    environment:
      JARVIS_CLOUD_URL: http://jarvis-cloud:3001
    ports:
      - "18789:18789"

volumes:
  jarvis-pgdata:
